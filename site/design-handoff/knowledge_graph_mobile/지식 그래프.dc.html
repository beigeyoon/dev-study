<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css">
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<style>
  .kg-body h3 { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#6f7890; margin:24px 0 8px; font-weight:600; }
  .kg-body h3:first-child { margin-top:4px; }
  .kg-body p { line-height:1.7; margin:0 0 10px; color:#c3c9d6; font-size:14px; }
  .kg-body ul { margin:0 0 10px; padding-left:18px; }
  .kg-body li { line-height:1.7; margin:6px 0; color:#c3c9d6; font-size:14px; }
  .kg-body code { background:#222838; padding:1.5px 5px; border-radius:4px; font-size:12.5px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:#7fe3c0; }
  .kg-body strong { color:#eef1f6; font-weight:600; }
  .kg-body em { color:#7c8499; font-style:normal; font-size:12.5px; }
  .kg-body a.kg-src { display:inline-flex; align-items:center; gap:6px; margin-top:26px; color:#00d9a6; font-size:13px; text-decoration:none; border:1px solid #1f5447; padding:7px 12px; border-radius:7px; transition:background .15s; }
  .kg-body a.kg-src:hover { background:#102a23; }
  .kg-root.mobile .kg-header { flex-wrap:wrap !important; height:auto !important; gap:10px 8px !important; padding:9px 12px !important; }
  .kg-root.mobile .kg-stats, .kg-root.mobile .kg-spacer { display:none !important; }
  .kg-root.mobile .kg-search { order:5; flex:1 1 100% !important; }
  .kg-root.mobile .kg-search input { width:100% !important; height:42px !important; }
  .kg-root.mobile .kg-gap-label { display:none !important; }
  .kg-root.mobile .kg-gapbtn { height:42px !important; }
  .kg-root.mobile .kg-tbtn { width:42px !important; height:42px !important; }
  .kg-root.mobile .kg-legend { left:10px !important; bottom:10px !important; max-width:150px !important; padding:10px 12px !important; }
  .kg-root.mobile .kg-legend-keys { display:none !important; }
  .kg-root.mobile .kg-panel { width:100% !important; }
</style>
</helmet>
<div ref="{{ rootRef }}" class="{{ rootClass }}" style="position:absolute; inset:0; display:flex; flex-direction:column; background:#0e1015; font-family:'Wanted Sans','Wanted Sans Variable',system-ui,sans-serif; color:#e5e7eb; overflow:hidden;">

  <header class="kg-header" style="flex:none; height:54px; display:flex; align-items:center; gap:16px; padding:0 18px; background:#11141c; border-bottom:1px solid #232a3a; z-index:6;">
    <div style="display:flex; align-items:baseline; gap:10px; min-width:0;">
      <span style="font-size:15px; font-weight:600; letter-spacing:-.02em; white-space:nowrap;">지식 그래프</span>
      <span class="kg-stats" style="font-size:12px; color:#6f7890; white-space:nowrap;">{{ stats }}</span>
    </div>

    <div class="kg-spacer" style="flex:1;"></div>

    <div class="kg-search" style="position:relative; display:flex; align-items:center;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6f7890" stroke-width="2" stroke-linecap="round" style="position:absolute; left:10px; pointer-events:none;"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
      <input value="{{ query }}" onInput="{{ onSearch }}" placeholder="개념·도메인 검색" style="width:208px; height:34px; padding:0 12px 0 32px; background:#0b0d13; border:1px solid #2a3142; border-radius:8px; color:#e5e7eb; font-size:13px; font-family:inherit; outline:none;" style-focus="border-color:#00d9a6;" />
    </div>

    <button onClick="{{ toggleGaps }}" title="빈틈(seed/고아)만 보기" class="kg-gapbtn" style="display:inline-flex; align-items:center; gap:7px; height:34px; padding:0 12px; background:#0b0d13; border:1px solid #2a3142; border-radius:8px; color:#cbd5e1; font-size:13px; font-family:inherit; cursor:pointer;" style-hover="border-color:#3a4358;">
      <span style="width:9px; height:9px; border-radius:2px; border:1.5px dashed #e5e7eb; flex:none;"></span>
      <span class="kg-gap-label">빈틈만</span>
      <sc-if value="{{ gapsActive }}" hint-placeholder-val="{{ false }}"><span style="width:6px; height:6px; border-radius:50%; background:#00d9a6; flex:none;"></span></sc-if>
    </button>

    <div style="display:flex; gap:4px; padding-left:6px; border-left:1px solid #232a3a; margin-left:2px;">
      <button onClick="{{ zoomOut }}" title="축소" class="kg-tbtn" style="width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:#0b0d13; border:1px solid #2a3142; border-radius:8px; cursor:pointer;" style-hover="border-color:#3a4358;"><svg width="15" height="15" viewBox="0 0 24 24" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
      <button onClick="{{ fitView }}" title="전체 보기" class="kg-tbtn" style="width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:#0b0d13; border:1px solid #2a3142; border-radius:8px; cursor:pointer;" style-hover="border-color:#3a4358;"><svg width="14" height="14" viewBox="0 0 24 24" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" fill="none"><path d="M3 8V4h4M21 8V4h-4M3 16v4h4M21 16v4h-4"></path></svg></button>
      <button onClick="{{ zoomIn }}" title="확대" class="kg-tbtn" style="width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:#0b0d13; border:1px solid #2a3142; border-radius:8px; cursor:pointer;" style-hover="border-color:#3a4358;"><svg width="15" height="15" viewBox="0 0 24 24" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
    </div>
  </header>

  <main style="position:relative; flex:1; min-height:0;">
    <div ref="{{ cyRef }}" style="position:absolute; inset:0;"></div>

    <aside class="kg-legend" style="position:absolute; left:16px; bottom:16px; z-index:5; background:rgba(15,18,26,.92); border:1px solid #262d3d; border-radius:11px; padding:13px 15px; max-width:230px; backdrop-filter:blur(6px);">
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#6f7890; margin-bottom:9px; font-weight:600;">도메인 · 클릭해 필터</div>
      <sc-for list="{{ domains }}" as="d" hint-placeholder-count="3">
        <div onClick="{{ d.onToggle }}" title="{{ d.title }}" style="display:flex; align-items:center; gap:9px; margin:5px 0; cursor:pointer; font-size:13px; color:#cbd5e1; opacity:{{ d.rowOpacity }}; transition:opacity .15s;">
          <span style="width:11px; height:11px; border-radius:3px; flex:none; background:{{ d.color }};"></span>{{ d.label }}
        </div>
      </sc-for>
      <div style="border-top:1px solid #262d3d; margin:11px 0 9px;"></div>
      <div class="kg-legend-keys" style="display:flex; flex-direction:column; gap:7px; font-size:12px; color:#9aa2b4; line-height:1.4;">
        <div style="display:flex; align-items:center; gap:9px;"><span style="display:inline-flex; gap:2px; align-items:center; flex:none;"><span style="width:7px;height:7px;border-radius:50%;background:#5b6479;"></span><span style="width:12px;height:12px;border-radius:50%;background:#5b6479;"></span></span>크기 = 중요도</div>
        <div style="display:flex; align-items:center; gap:9px;"><span style="width:13px;height:13px;border-radius:50%;flex:none;background:conic-gradient(#ff8a5b 0 65%, #1a2030 65% 100%);border:1.5px solid #ff8a5b;"></span>채움 = 숙련도</div>
        <div style="display:flex; align-items:center; gap:9px;"><span style="width:12px;height:12px;border-radius:50%;flex:none;border:1.5px dashed #e5e7eb;"></span>흰 점선 = 빈틈</div>
      </div>
    </aside>

    <aside class="kg-panel" style="position:absolute; top:0; right:0; z-index:10; width:min(440px,92%); height:100%; overflow-y:auto; background:#12151e; border-left:1px solid #232a3a; padding:26px 26px 56px; box-shadow:-12px 0 32px rgba(0,0,0,.32); transform:{{ panelTransform }}; transition:transform .24s ease;">
      <button onClick="{{ closePanel }}" aria-label="닫기" style="position:absolute; top:16px; right:18px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; background:none; border:none; color:#7c8499; font-size:24px; line-height:1; cursor:pointer; border-radius:6px;" style-hover="color:#e5e7eb; background:#1c2230;">×</button>
      <sc-if value="{{ sel }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex; align-items:center; gap:9px; margin:2px 44px 14px 0;">
          <span style="width:13px; height:13px; border-radius:4px; flex:none; background:{{ sel.color }};"></span>
          <h1 style="font-size:21px; font-weight:600; letter-spacing:-.02em; margin:0;">{{ sel.title }}</h1>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:7px; margin-bottom:6px;">
          <span style="font-size:12px; padding:4px 9px; border-radius:6px; background:#1d2433; color:#aeb6c7;">{{ sel.domain }}</span>
          <span style="font-size:12px; padding:4px 9px; border-radius:6px; background:#1d2433; color:#aeb6c7;">숙련도 {{ sel.mastery }}/5</span>
          <span style="font-size:12px; padding:4px 9px; border-radius:6px; background:#1d2433; color:#aeb6c7;">중요도 {{ sel.importance }}/5</span>
          <span style="font-size:12px; padding:4px 9px; border-radius:6px; background:#1d2433; color:#aeb6c7;">{{ sel.status }}</span>
        </div>
        <div class="kg-body" ref="{{ bodyRef }}"></div>
      </sc-if>
    </aside>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;layoutMode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;force&quot;,&quot;domain&quot;,&quot;importance&quot;],&quot;default&quot;:&quot;force&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;crowdedLabels&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;repoBase&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://github.com/beigeyoon/dev-study/blob/main/&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  bodyRef = React.createRef();
  cyRef = React.createRef();
  rootRef = React.createRef();

  DOMAIN_COLORS = {
    frontend:'#ff8a5b', network:'#f0b34a', devops:'#8fc861', backend:'#46c98a',
    database:'#34c4c4', 'system-design':'#5aa6f0', cs:'#8b93f5', ai:'#c77ae0',
    os:'#f06b8a', unknown:'#8a93a6',
  };

  state = { selected:null, query:'', activeDomains:{}, gapsOnly:false, domainKeys:[], nodeCount:0, gapCount:0, isMobile:false };

  colorFor(d){ return this.DOMAIN_COLORS[d] ?? this.DOMAIN_COLORS.unknown; }

  componentDidMount(){
    this._waitCyto();
    window.addEventListener('resize', this._onResize);
    if(window.ResizeObserver && this.rootRef.current){
      this._ro = new ResizeObserver((entries)=>{
        const w = entries[0].contentRect.width;
        const m = w <= 640;
        if(m !== this.state.isMobile) this.setState({ isMobile:m }, ()=>{ if(this.cy) this.cy.resize(); });
      });
      this._ro.observe(this.rootRef.current);
    }
  }
  componentWillUnmount(){ window.removeEventListener('resize', this._onResize); if(this._ro) this._ro.disconnect(); if(this.cy) this.cy.destroy(); }
  _onResize = () => { if(this.cy) this.cy.resize(); };

  _waitCyto(tries=0){
    if(window.cytoscape){ this._init(); return; }
    if(tries>120) return;
    setTimeout(()=>this._waitCyto(tries+1), 50);
  }

  async _init(){ this.loadGraph(); }

  async loadGraph(){
    let data;
    try { data = await fetch('./graph.json').then(r=>r.json()); }
    catch(e){ return; }
    const nodes = data.nodes || [];
    const present = [...new Set(nodes.map(n=>n.domain))];
    const gapCount = nodes.filter(n=>n.isGap).length;
    this.setState({ domainKeys:present, nodeCount:nodes.length, gapCount, selected:null });

    const elements = [
      ...nodes.map(n=>({ data:{ ...n, masteryPct:(n.mastery/5)*100, color:this.colorFor(n.domain) } })),
      ...(data.edges||[]).map(e=>({ data:{ id:`${e.source}__${e.target}`, source:e.source, target:e.target } })),
    ];

    if(this.cy){ this.cy.destroy(); this.cy=null; }
    this.cy = window.cytoscape({
      container: this.cyRef.current,
      elements,
      minZoom:0.25, maxZoom:2.5,
      style:[
        { selector:'node', style:{
          'width':'mapData(importance,1,5,38,86)','height':'mapData(importance,1,5,38,86)',
          'background-color':'#171b27','background-opacity':1,
          'border-color':'data(color)','border-width':2.5,
          'pie-size':'92%','pie-1-background-color':'data(color)','pie-1-background-size':'data(masteryPct)','pie-1-background-opacity':0.92,
          'label':'data(title)','color':'#d6dae3','font-family':'Wanted Sans, sans-serif','font-size':12,'font-weight':500,
          'text-valign':'bottom','text-halign':'center','text-margin-y':6,'text-wrap':'wrap','text-max-width':130,
          'text-background-color':'#0e1015','text-background-opacity':0.78,'text-background-padding':3,'text-background-shape':'roundrectangle',
          'transition-property':'opacity, border-width','transition-duration':'0.15s',
        }},
        { selector:'node[?isGap]', style:{ 'border-color':'#e5e7eb','border-style':'dashed','border-width':2.5 }},
        { selector:'edge', style:{ 'width':1.5,'line-color':'#333b4f','curve-style':'bezier','opacity':0.6,'transition-property':'opacity, line-color, width','transition-duration':'0.15s' }},
        { selector:'edge.hl', style:{ 'line-color':'#6b7790','width':2.4,'opacity':1 }},
        { selector:'.faded', style:{ 'opacity':0.09 }},
        { selector:'node.faded', style:{ 'text-opacity':0 }},
        { selector:'node.dimN', style:{ 'opacity':0.3 }},
        { selector:'node.labelHide', style:{ 'text-opacity':0 }},
        { selector:'node.hover', style:{ 'overlay-color':'#ffffff','overlay-opacity':0.07,'overlay-padding':6 }},
        { selector:'node:selected', style:{ 'overlay-color':'#ffffff','overlay-opacity':0.16,'overlay-padding':9,'border-width':3.5 }},
      ],
      layout:{ name:'preset' },
    });

    this.cy.on('tap','node', (evt)=>{ this.setState({ selected: evt.target.data() }, ()=>this.refresh()); });
    this.cy.on('tap', (evt)=>{ if(evt.target===this.cy){ this.cy.$(':selected').unselect(); this.setState({ selected:null }, ()=>this.refresh()); } });
    this.cy.on('mouseover','node', e=>e.target.addClass('hover'));
    this.cy.on('mouseout','node', e=>e.target.removeClass('hover'));

    this.runLayout();
  }

  runLayout(){
    if(!this.cy) return;
    this.cy.resize();
    const mode = this.props.layoutMode ?? 'force';
    let lay;
    if(mode==='importance'){
      lay = { name:'concentric', concentric:n=>n.data('importance'), levelWidth:()=>1, minNodeSpacing:46, padding:70, animate:true };
    } else if(mode==='domain'){
      const groups = {};
      this.cy.nodes().forEach(n=>{ const d=n.data('domain'); (groups[d]=groups[d]||[]).push(n); });
      const keys = Object.keys(groups); const colW = 230; const rowH = 150;
      keys.forEach((k,ci)=>{ groups[k].forEach((n,ri)=>{ n.position({ x: 120+ci*colW, y: 120+ri*rowH }); }); });
      this.cy.fit(undefined,70);
      this.refresh(); return;
    } else {
      lay = { name:'cose', animate:true, randomize:true, padding:70, nodeRepulsion:11000, idealEdgeLength:135, nodeDimensionsIncludeLabels:true };
    }
    const l = this.cy.layout(lay); l.one('layoutstop', ()=>{ this.cy.fit(undefined,70); this.refresh(); }); l.run();
  }

  refresh(){
    if(!this.cy) return;
    const { query, gapsOnly, activeDomains, selected } = this.state;
    const crowded = this.props.crowdedLabels !== false;
    const q = (query||'').trim().toLowerCase();
    const selNode = selected ? this.cy.getElementById(selected.id) : null;
    const keep = (selNode && selNode.nonempty()) ? selNode.closedNeighborhood() : null;
    this.cy.batch(()=>{
      this.cy.nodes().forEach(n=>{
        const d=n.data();
        const domainOn = activeDomains[d.domain] !== false;
        const gapOk = !gapsOnly || d.isGap;
        const matchOk = !q || (d.title||'').toLowerCase().includes(q) || (d.domain||'').toLowerCase().includes(q);
        const visible = domainOn && gapOk && matchOk;
        n.removeClass('faded dimN labelHide');
        if(!visible){ n.addClass('faded'); return; }
        if(keep && !keep.contains(n)) n.addClass('dimN');
        let showLabel = crowded;
        if(!crowded) showLabel = keep ? keep.contains(n) : false;
        if(!showLabel) n.addClass('labelHide');
      });
      this.cy.edges().forEach(e=>{
        const hidden = e.source().hasClass('faded') || e.target().hasClass('faded');
        e.removeClass('faded hl');
        if(hidden){ e.addClass('faded'); return; }
        if(keep && keep.contains(e)) e.addClass('hl');
      });
    });
  }

  toggleDomain = (key) => {
    this.setState(s=>{ const a={...s.activeDomains}; a[key] = a[key]===false; return { activeDomains:a }; }, ()=>this.refresh());
  };
  toggleGaps = () => this.setState(s=>({ gapsOnly:!s.gapsOnly }), ()=>this.refresh());
  onSearch = (e) => { const v=e.target.value; this.setState({ query:v }, ()=>this.refresh()); };
  closePanel = () => { if(this.cy) this.cy.$(':selected').unselect(); this.setState({ selected:null }, ()=>this.refresh()); };
  zoomIn = () => this.cy && this.cy.animate({ zoom:this.cy.zoom()*1.3, center:{eles:this.cy.elements()} }, {duration:150});
  zoomOut = () => this.cy && this.cy.animate({ zoom:this.cy.zoom()/1.3, center:{eles:this.cy.elements()} }, {duration:150});
  fitView = () => this.cy && this.cy.animate({ fit:{padding:70} }, {duration:200});

  componentDidUpdate(prevProps){
    if(prevProps.layoutMode !== this.props.layoutMode) this.runLayout();
    if(prevProps.crowdedLabels !== this.props.crowdedLabels) this.refresh();
    const sel = this.state.selected;
    if(this.bodyRef.current){
      if(sel && this._injId !== sel.id){
        this._injId = sel.id;
        const base = this.props.repoBase ?? 'https://github.com/beigeyoon/dev-study/blob/main/';
        this.bodyRef.current.innerHTML =
          `<h3>한 줄 정의</h3>${sel.definitionHtml || '<p>(없음)</p>'}`+
          `<h3>내 파인만 설명</h3>${sel.feynmanHtml || '<p>(아직 없음)</p>'}`+
          `<a class="kg-src" href="${base}${sel.sourcePath}" target="_blank" rel="noopener">원문 보기 <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg></a>`;
      } else if(!sel){ this._injId = null; }
    }
  }

  renderVals(){
    const { query, activeDomains, gapsOnly, domainKeys, nodeCount, gapCount, selected } = this.state;
    const domains = domainKeys.map(key=>({
      key, label:key, color:this.colorFor(key),
      rowOpacity: activeDomains[key]===false ? 0.32 : 1,
      title: activeDomains[key]===false ? `${key} 숨김 — 클릭해 표시` : `${key} 표시 중 — 클릭해 숨김`,
      onToggle: ()=>this.toggleDomain(key),
    }));
    const stats = nodeCount ? `${nodeCount}개 개념 · 빈틈 ${gapCount}` : '';
    return {
      cyRef:this.cyRef, bodyRef:this.bodyRef, rootRef:this.rootRef,
      rootClass: this.state.isMobile ? 'kg-root mobile' : 'kg-root',
      query, onSearch:this.onSearch,
      gapsActive:gapsOnly, toggleGaps:this.toggleGaps,
      zoomIn:this.zoomIn, zoomOut:this.zoomOut, fitView:this.fitView,
      closePanel:this.closePanel,
      domains, stats,
      sel:selected,
      panelTransform: selected ? 'translateX(0)' : 'translateX(100%)',
    };
  }
}
</script>
</body>
</html>
